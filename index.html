<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker Pro - Full Header Data</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
            --gray: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container { max-width: 1400px; margin: auto; }

        /* HEADER: FULL DATA */
        .header-ip {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.2fr 1fr 1fr; /* Tambah kolom */
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.3);
        }

        .stat-box h4 { margin: 0 0 8px 0; font-size: 0.65rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1.2px; }
        .stat-value { font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
        .ip-large { font-size: 2.2rem; color: #60a5fa; font-family: 'Monaco', monospace; margin-top: 5px; }

        .main-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: monospace;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .table-container { margin-top: 30px; overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1100px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 0.75rem; color: var(--gray); border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .bg-safe { background: #dcfce7; color: #15803d; }
        .bg-risk { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ip">
        <div class="stat-box">
            <h4>IP Perangkat Anda</h4>
            <div id="my-ip" class="ip-large">...</div>
        </div>
        <div class="stat-box">
            <h4>Lokasi & ZIP</h4>
            <div id="my-loc" class="stat-value">-</div>
        </div>
        <div class="stat-box">
            <h4>Provider & Org</h4>
            <div id="my-provider" class="stat-value">-</div>
        </div>
        <div class="stat-box">
            <h4>Koordinat & TZ</h4>
            <div id="my-coord" class="stat-value">-</div>
        </div>
        <div class="stat-box">
            <h4>Security</h4>
            <div id="my-proxy" class="stat-value">-</div>
        </div>
    </div>

    <div class="main-card">
        <h2>Bulk IP Detail Lookup</h2>
        <textarea id="ipInput" placeholder="Masukkan daftar IP per baris..."></textarea>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-action" id="btnCheck" onclick="runBulkCheck()">Mulai Cek Massal</button>
            <span id="loading-text" style="display:none; color: var(--primary); font-weight: 600;">⌛ Memproses...</span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Negara</th>
                        <th>Kota & ZIP</th>
                        <th>Provider (ISP)</th>
                        <th>Organisasi</th>
                        <th>Proxy?</th>
                        <th>Lat / Lon</th>
                        <th>Timezone</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Konfigurasi field yang ditarik dari API
    const FIELDS = "query,status,country,countryCode,city,zip,isp,org,proxy,lat,lon,timezone";

    // 1. Fungsi untuk mengisi Header secara lengkap
    async function initHeader() {
        try {
            const res = await fetch(`https://i.pn/json/?fields=${FIELDS}&_=${Date.now()}`, {
                cache: 'no-store'
            });
            const d = await res.json();
            
            if(d.status === 'success') {
                document.getElementById('my-ip').innerText = d.query;
                document.getElementById('my-loc').innerHTML = `${d.city}, ${d.countryCode}<br>ZIP: ${d.zip || '-'}`;
                document.getElementById('my-provider').innerHTML = `ISP: ${d.isp || '-'}<br>Org: ${d.org || '-'}`;
                document.getElementById('my-coord').innerHTML = `${d.lat}, ${d.lon}<br>${d.timezone}`;
                document.getElementById('my-proxy').innerHTML = d.proxy ? 
                    '<span style="color:var(--danger)">YES (VPN/PROXY)</span>' : 
                    '<span style="color:var(--success)">NO (CLEAN)</span>';
            }
        } catch (e) {
            document.getElementById('my-ip').innerText = "Err";
        }
    }

    // 2. Fungsi Cek Massal
    async function runBulkCheck() {
        const input = document.getElementById('ipInput').value;
        const tbody = document.getElementById('resultBody');
        const btn = document.getElementById('btnCheck');
        const loader = document.getElementById('loading-text');

        const lines = input.split('\n').filter(l => l.trim() !== "");
        if (lines.length === 0) return alert("Input kosong!");

        tbody.innerHTML = "";
        btn.disabled = true;
        loader.style.display = "inline";

        for (let line of lines) {
            const ip = line.split(':')[0].trim();
            try {
                const res = await fetch(`https://i.pn/json/${ip}?fields=${FIELDS}&_=${Date.now()}`);
                const d = await res.json();

                tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><strong>${d.query || ip}</strong></td>
                        <td>${d.country || '-'} (${d.countryCode || '-'})</td>
                        <td>${d.city || '-'}, <code>${d.zip || '-'}</code></td>
                        <td>${d.isp || '-'}</td>
                        <td>${d.org || '-'}</td>
                        <td><span class="badge ${d.proxy ? 'bg-risk' : 'bg-safe'}">${d.proxy ? 'YES' : 'NO'}</span></td>
                        <td>${d.lat}, ${d.lon}</td>
                        <td>${d.timezone || '-'}</td>
                    </tr>`);
            } catch (e) {
                tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="8" style="color:red">Error: ${ip}</td></tr>`);
            }
            await new Promise(r => setTimeout(r, 300));
        }

        btn.disabled = false;
        loader.style.display = "none";
    }

    document.addEventListener('DOMContentLoaded', initHeader);
</script>

</body>
</html>
