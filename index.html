<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker & Bulk Checker - Fixed</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
            --gray: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container { max-width: 1100px; margin: auto; }

        /* HEADER */
        .header-ip {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.3);
        }

        .stat-box h4 { margin: 0 0 10px 0; font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1.5px; }
        .stat-value { font-size: 1.1rem; font-weight: 600; }
        .ip-display { font-size: 2.2rem; color: #60a5fa; font-family: 'Monaco', monospace; margin-top: 5px; }

        /* MAIN CARD */
        .main-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Consolas', monospace;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-action:disabled { background: #cbd5e1; }

        .table-container { margin-top: 30px; overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.8rem; color: var(--gray); border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        .bg-safe { background: #dcfce7; color: #15803d; }
        .bg-risk { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ip">
        <div class="stat-box">
            <h4>Alamat IP Asli Anda</h4>
            <div id="my-ip" class="ip-display">Mendeteksi...</div>
        </div>
        <div class="stat-box">
            <h4>Lokasi & ZIP</h4>
            <div id="my-loc" class="stat-value">-</div>
        </div>
        <div class="stat-box">
            <h4>Provider (ISP)</h4>
            <div id="my-isp" class="stat-value">-</div>
        </div>
        <div class="stat-box">
            <h4>Status Proxy</h4>
            <div id="my-proxy" class="stat-value">-</div>
        </div>
    </div>

    <div class="main-card">
        <h2>Bulk IP Geolocation Tool</h2>
        <textarea id="ipInput" placeholder="Masukkan daftar IP per baris..."></textarea>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-action" id="btnCheck" onclick="runBulkCheck()">Mulai Cek Massal</button>
            <span id="loading-text" style="display:none; color: var(--primary); font-weight: 600;">⌛ Memproses...</span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Negara</th>
                        <th>Kota</th>
                        <th>ZIP Code</th>
                        <th>ISP / Organisasi</th>
                        <th>Proxy?</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Fungsi Deteksi IP di Header (Dibuat lebih kuat)
    async function detectMyIP() {
        const myIpEl = document.getElementById('my-ip');
        const myLocEl = document.getElementById('my-loc');
        const myIspEl = document.getElementById('my-isp');
        const myProxyEl = document.getElementById('my-proxy');

        try {
            // Kita coba i.pn dulu dengan cache busting
            const response = await fetch(`https://i.pn/json/?_=${Date.now()}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            
            if (!response.ok) throw new Error('i.pn fail');
            
            const data = await response.json();
            myIpEl.innerText = data.query;
            myLocEl.innerText = `${data.city}, ${data.countryCode} (${data.zip || '-'})`;
            myIspEl.innerText = data.isp || data.org || '-';
            myProxyEl.innerHTML = data.proxy ? '<span style="color:var(--danger)">YES 🛡️</span>' : '<span style="color:var(--success)">NO ✅</span>';
            
        } catch (error) {
            // Jika i.pn error, gunakan backup API (ip-api.com)
            try {
                const resBackup = await fetch('https://ipapi.co/json/');
                const d = await resBackup.json();
                myIpEl.innerText = d.ip;
                myLocEl.innerText = `${d.city}, ${d.country_code} (${d.postal})`;
                myIspEl.innerText = d.org;
                myProxyEl.innerText = "N/A (Backup Mode)";
            } catch (err2) {
                myIpEl.innerText = "Koneksi Lemah";
            }
        }
    }

    // Fungsi Bulk Check
    async function runBulkCheck() {
        const input = document.getElementById('ipInput').value;
        const tbody = document.getElementById('resultBody');
        const btn = document.getElementById('btnCheck');
        const loader = document.getElementById('loading-text');

        const lines = input.split('\n').filter(l => l.trim() !== "");
        if (lines.length === 0) return alert("Masukkan IP!");

        tbody.innerHTML = "";
        btn.disabled = true;
        loader.style.display = "inline";

        for (let line of lines) {
            const ip = line.split(':')[0].trim();
            try {
                const res = await fetch(`https://i.pn/json/${ip}?fields=query,status,country,city,zip,isp,proxy&_=${Date.now()}`);
                const d = await res.json();

                const row = `
                    <tr>
                        <td><strong>${d.query || ip}</strong></td>
                        <td>${d.country || '-'}</td>
                        <td>${d.city || '-'}</td>
                        <td><code>${d.zip || '-'}</code></td>
                        <td>${d.isp || '-'}</td>
                        <td><span class="badge ${d.proxy ? 'bg-risk' : 'bg-safe'}">${d.proxy ? 'YES' : 'NO'}</span></td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            } catch (e) {
                tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="6" style="color:red">Error pada IP: ${ip}</td></tr>`);
            }
            await new Promise(r => setTimeout(r, 300)); // Jeda 0.3 detik agar tidak diblokir
        }

        btn.disabled = false;
        loader.style.display = "none";
    }

    // Jalankan otomatis
    document.addEventListener('DOMContentLoaded', detectMyIP);
</script>

</body>
</html>
