<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker & Bulk Checker</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            color: #334155;
        }

        .container { max-width: 1100px; margin: auto; }

        /* HEADER: Info IP Saat Ini */
        .header-status {
            background: var(--dark);
            color: white;
            padding: 25px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-group h4 { margin: 0 0 8px 0; font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .stat-value { font-size: 1.1rem; font-weight: 600; word-break: break-all; }
        .ip-large { font-size: 1.8rem; color: #60a5fa; font-family: 'Courier New', monospace; }

        /* CARD: Bulk Checker */
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .btn-check {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-check:hover { background: #1d4ed8; }
        .btn-check:disabled { opacity: 0.5; }

        /* TABLE */
        .table-wrapper { margin-top: 25px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
        .badge-proxy { background: #fee2e2; color: #991b1b; }
        .badge-clean { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-status">
        <div class="stat-group">
            <h4>Alamat IP Anda</h4>
            <div id="my-ip" class="stat-value ip-large">Mendeteksi...</div>
        </div>
        <div class="stat-group">
            <h4>Lokasi & ZIP</h4>
            <div id="my-loc" class="stat-value">-</div>
        </div>
        <div class="stat-group">
            <h4>Penyedia (ISP)</h4>
            <div id="my-isp" class="stat-value">-</div>
        </div>
        <div class="stat-group">
            <h4>Status Proxy</h4>
            <div id="my-proxy" class="stat-value">-</div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">Bulk IP Lookup</h3>
        <p style="font-size: 0.9rem; color: #64748b;">Masukkan daftar IP (format IP:PORT:USER:PASS juga bisa, script akan otomatis membersihkannya).</p>
        
        <textarea id="ipInput" placeholder="8.8.8.8&#10;1.1.1.1:80:user:pass"></textarea>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-check" id="btnRun" onclick="processBulk()">Mulai Cek Massal</button>
            <span id="loader" style="display:none; font-size: 0.9rem; color: var(--primary);">⌛ Memproses...</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Negara</th>
                        <th>Kota</th>
                        <th>ZIP</th>
                        <th>ISP</th>
                        <th>Proxy?</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 1. OTOMATIS CEK IP SAAT INI (DI HEADER) ---
    async function initHeader() {
        try {
            const response = await fetch('https://i.pn/json/');
            const data = await response.json();
            
            document.getElementById('my-ip').innerText = data.query;
            document.getElementById('my-loc').innerText = `${data.city}, ${data.countryCode} (${data.zip})`;
            document.getElementById('my-isp').innerText = data.isp || data.org;
            
            const proxyStatus = document.getElementById('my-proxy');
            if (data.proxy) {
                proxyStatus.innerHTML = '<span style="color:var(--danger)">TERDETEKSI (YES)</span>';
            } else {
                proxyStatus.innerHTML = '<span style="color:var(--success)">BERSIH (NO)</span>';
            }
        } catch (err) {
            document.getElementById('my-ip').innerText = "Gagal Load";
            console.error("Gagal mengambil IP header:", err);
        }
    }

    // --- 2. FUNGSI CEK MASSAL ---
    async function processBulk() {
        const input = document.getElementById('ipInput').value;
        const btn = document.getElementById('btnRun');
        const loader = document.getElementById('loader');
        const tbody = document.getElementById('resultBody');

        const lines = input.split('\n').filter(l => l.trim() !== "");
        if (lines.length === 0) return alert("Input kosong!");

        btn.disabled = true;
        loader.style.display = "inline";
        tbody.innerHTML = "";

        for (let line of lines) {
            // Ambil IP saja (sebelum titik dua pertama)
            const ip = line.split(':')[0].trim();

            try {
                const res = await fetch(`https://i.pn/json/${ip}?fields=query,status,country,city,zip,isp,proxy`);
                const d = await res.json();

                const row = `
                    <tr>
                        <td><b>${d.query}</b></td>
                        <td>${d.country}</td>
                        <td>${d.city}</td>
                        <td><code>${d.zip}</code></td>
                        <td>${d.isp}</td>
                        <td><span class="badge ${d.proxy ? 'badge-proxy' : 'badge-clean'}">${d.proxy ? 'YES' : 'NO'}</span></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            } catch (e) {
                tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="6" style="color:red">Error: ${ip}</td></tr>`);
            }
            // Jeda 200ms agar API tidak overload
            await new Promise(r => setTimeout(r, 200));
        }

        btn.disabled = false;
        loader.style.display = "none";
    }

    // Jalankan pengecekan header saat window dibuka
    window.onload = initHeader;
</script>

</body>
</html>
